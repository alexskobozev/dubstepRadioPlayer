name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  FLUTTER_VERSION: '3.44.x'
  JAVA_VERSION: '17'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/lcov.info

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    needs: [analyze, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Stub flutterfire CLI
        # The Runner Xcode project has a build phase that calls
        # "flutterfire upload-crashlytics-symbols" on every build. That needs
        # the real FlutterFire CLI + a generated Firebase app_id_file +
        # firebase-ios-sdk Crashlytics/run binary in SPM checkouts — a fragile
        # stack to set up in CI for a debug build that produces no dSYMs to
        # upload. Stub the CLI to no-op so the script phase passes.
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/flutterfire" <<'SH'
          #!/usr/bin/env bash
          echo "[CI stub] flutterfire $* — skipping"
          exit 0
          SH
          chmod +x "$HOME/.local/bin/flutterfire"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build iOS simulator (debug)
        run: flutter build ios --debug --simulator
