name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  FLUTTER_VERSION: '3.44.x'
  JAVA_VERSION: '17'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/lcov.info

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    needs: [analyze, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install FlutterFire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: flutter pub get

      - name: Stage FlutterFire iOS app_id_file
        # The Xcode "upload-crashlytics-symbols" build phase reads this file.
        # flutterfire configure normally writes it, but that requires Firebase
        # auth. The values below mirror lib/firebase_options.dart (iOS) and
        # ios/Runner/GoogleService-Info.plist, which are both checked in.
        run: |
          mkdir -p .dart_tool/flutterfire/platforms/ios/default/dubstepfm-25bd3
          cat > .dart_tool/flutterfire/platforms/ios/default/dubstepfm-25bd3/app_id_file.json <<'JSON'
          {
            "FILE_GENERATED_BY": "CI",
            "PURPOSE": "FirebaseAppID for this Firebase app in this directory, currently used by Crashlytics.",
            "GOOGLE_APP_ID": "1:792316857839:ios:86a9ba1b9605220c04fa1a",
            "FIREBASE_PROJECT_ID": "dubstepfm-25bd3"
          }
          JSON

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign
