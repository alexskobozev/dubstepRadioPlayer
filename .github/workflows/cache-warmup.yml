name: Cache Warmup

on:
  workflow_dispatch:

jobs:
  warmup:
    name: Warm up Flutter pub cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Precache Android artifacts
        run: flutter precache --android
